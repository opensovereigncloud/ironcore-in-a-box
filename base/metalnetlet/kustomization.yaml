apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - github.com/ironcore-dev/ironcore-net/config/metalnetlet/kind?ref=v0.4.0

images:
  - name: metalnetlet
    newName: ghcr.io/ironcore-dev/ironcore-net/metalnetlet
    newTag: v0.4.0

patches:
  - path: patch-deployment.yaml
  - path: add-manager-args.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      namespace: metalnetlet-system
      name: metalnetlet-controller-manager
