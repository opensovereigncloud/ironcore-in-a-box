name: Tests

on:
  pull_request:
    types: [ assigned, opened, synchronize, reopened ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  schedule:
    # Run regularly at 3:22 each Monday
    - cron: "22 3 * * 1"

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -yqq shellcheck sshpass
      - name: Lint tests
        run: make lint-tests
      - name: Run tests
        run: make test
